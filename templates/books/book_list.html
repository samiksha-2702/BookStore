{% extends 'base.html' %}

{% block content %}
<h2>All Books</h2>

<div class="row">
{% for book in books %}
    <div class="col-md-3">
        <div class="card mb-3">
            {% if book.image %}
                <img src="{{ book.image.url }}" class="card-img-top">
            {% endif %}
            <div class="card-body">
                <h5>
                    <a href="{% url 'book_detail' book.id %}">
                        {{ book.title }}
                    </a>
                </h5>
                <p>₹{{ book.price }}</p>
                <p>{{ book.category.name }}</p>
            </div>
        </div>
    </div>
{% endfor %}
</div>

{% endblock %}
