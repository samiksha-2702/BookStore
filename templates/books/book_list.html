{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">
    <!-- Category Filter -->
    <div class="mb-4">
        <h4>Categories</h4>
        <div class="d-flex flex-wrap gap-2">
            <a href="{% url 'book_list' %}" class="btn btn-outline-dark btn-sm">All</a>
            {% for category in categories %}
                <a href="?category={{ category.id }}" class="btn btn-outline-dark btn-sm">{{ category.name }}</a>
            {% endfor %}
        </div>
    </div>

    <!-- Books Grid -->
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
        {% for book in books %}
        <div class="col">
            <div class="card card-hover h-100 text-center">
                <!-- Clickable image -->
                <a href="{% url 'book_detail' book.id %}">
                    <img src="{{ book.image.url }}" class="card-img-top book-img" alt="{{ book.title }}">
                </a>

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ book.title }}</h5>
                    <p class="card-text text-muted mb-2">{{ book.author }}</p>
                    <p class="card-text fw-bold mb-3">₹{{ book.price }}</p>

                    <div class="mt-auto d-flex justify-content-center gap-2">
                        <a href="{% url 'book_detail' book.id %}" class="btn btn-outline-dark btn-sm">Details</a>
                        <a href="{% url 'add_to_cart' book.id %}" class="btn btn-warning btn-sm">Add to Cart</a>
                    </div>
                </div>
            </div>
        </div>
        {% empty %}
        <p>No books found.</p>
        {% endfor %}
    </div>
</div>

{% endblock %}
