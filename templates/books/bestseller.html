{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">
    <h3 class="mb-4">Bestsellers</h3>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
        {% for book in books %}
        <div class="col">
            <div class="card card-hover h-100">
                <img src="{{ book.image.url }}" class="card-img-top" alt="{{ book.title }}">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ book.title }}</h5>
                    <p class="card-text text-muted mb-2">{{ book.author }}</p>
                    <p class="card-text fw-bold mb-2">₹{{ book.price }}</p>
                    <div class="mt-auto d-flex justify-content-between align-items-center">
                        <a href="{% url 'book_detail' book.id %}" class="btn btn-outline-dark btn-sm">Details</a>
                        <a href="{% url 'add_to_cart' book.id %}" class="btn btn-warning btn-sm">Add to Cart</a>
                    </div>
                </div>
            </div>
        </div>
        {% empty %}
        <p>No bestsellers available.</p>
        {% endfor %}
    </div>
</div>

{% endblock %}
