{% extends 'base.html' %}
{% block content %}

<div class="container mt-5">
    <div class="row">
        <div class="col-md-5">
            <img src="{{ book.image.url }}" class="img-fluid rounded shadow" alt="{{ book.title }}">
        </div>
        <div class="col-md-7">
            <h2 class="fw-bold">{{ book.title }}</h2>
            <p class="text-muted">{{ book.author }}</p>
            <p class="fw-bold fs-4">₹{{ book.price }}</p>
            <p>{{ book.description }}</p>

            <a href="{% url 'add_to_cart' book.id %}" class="btn btn-warning btn-lg me-2">Add to Cart</a>
            <a href="{% url 'book_list' %}" class="btn btn-outline-dark btn-lg">Back to Store</a>
        </div>
    </div>
</div>

{% endblock %}
