{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">
    <div class="row">

        <!-- 📸 Book Image -->
        <div class="col-md-5 text-center">
            {% if book.image %}
                <img src="{{ book.image.url }}" class="img-fluid rounded shadow product-detail-img">
            {% else %}
                <img src="https://via.placeholder.com/300x400" class="img-fluid rounded shadow">
            {% endif %}
        </div>

        <!-- 📖 Book Details -->
        <div class="col-md-7">

            <h2 class="fw-bold">{{ book.title }}</h2>
            <p class="text-muted">by {{ book.author }}</p>

            <p class="badge bg-secondary">{{ book.category.name }}</p>

            <h3 class="text-danger mt-3">₹{{ book.price }}</h3>

            <hr>

            <p>{{ book.description }}</p>

            <!-- 🛒 Buttons -->
            <div class="mt-4">
                <a href="{% url 'add_to_cart' book.id %}" class="btn btn-dark me-2 px-4">
                    🛒 Add to Cart
                </a>

                <a href="/" class="btn btn-outline-secondary px-4">
                    ← Back
                </a>
            </div>

        </div>
    </div>
</div>

{% endblock %}
