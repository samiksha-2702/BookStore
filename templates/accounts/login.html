{% extends 'base.html' %}
{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-icon">
                        <i class="fa-regular fa-keyboard"></i>
                    </div>
                    <h2 class="auth-title">Welcome Back</h2>
                    <p class="auth-subtitle">Login to your account</p>
                </div>
                
                <form method="POST" class="auth-form">
                    {% csrf_token %}
                    
                    {% if error %}
                        <div class="alert alert-danger mb-3">
                            <i class="fa-regular fa-circle-exclamation me-2"></i>
                            {{ error }}
                        </div>
                    {% endif %}
                    
                    <div class="form-group mb-3">
                        <label class="form-label">
                            <i class="fa-regular fa-user me-1"></i>Username
                        </label>
                        <input type="text" name="username" class="form-control" 
                               placeholder="Enter your username" required autofocus>
                    </div>
                    
                    <div class="form-group mb-4">
                        <label class="form-label">
                            <i class="fa-regular fa-lock me-1"></i>Password
                        </label>
                        <input type="password" name="password" class="form-control" 
                               placeholder="Enter your password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-premium w-100">
                        <i class="fa-regular fa-arrow-right-to-bracket me-2"></i>Login
                    </button>
                </form>
                
                <div class="text-center mt-3">
                    <p class="mb-0 text-secondary">Don't have an account? 
                        <a href="{% url 'signup' %}" class="auth-link">Sign Up</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .auth-card {
        background: var(--bg-secondary);
        border: 1px solid var(--border-light);
        border-radius: 24px;
        padding: 2rem;
        box-shadow: var(--shadow-md);
    }
    
    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    
    .auth-icon {
        width: 70px;
        height: 70px;
        background: var(--accent-bg);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1rem;
    }
    
    .auth-icon i {
        font-size: 2rem;
        color: var(--accent);
    }
    
    .auth-title {
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 0.5rem;
    }
    
    .auth-subtitle {
        color: var(--text-secondary);
        font-size: 0.9rem;
    }
    
    .form-label {
        font-weight: 600;
        font-size: 0.85rem;
        color: var(--text-primary);
        margin-bottom: 0.5rem;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    
    .form-label i {
        color: var(--accent);
    }
    
    .auth-link {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
    }
    
    .auth-link:hover {
        color: var(--accent-dark);
        text-decoration: underline;
    }
    
    @media (max-width: 768px) {
        .auth-card {
            padding: 1.5rem;
            margin: 0 15px;
        }
        
        .auth-title {
            font-size: 1.5rem;
        }
    }
</style>

{% endblock %}
