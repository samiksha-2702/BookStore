<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BookStore</title>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0c10 0%, #0e1117 100%);
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(230, 177, 126, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 80%, rgba(93, 155, 155, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Floating Books Animation */
        .floating-books {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .floating-book {
            position: absolute;
            opacity: 0.03;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
            }
        }

        /* Auth Container */
        .auth-container {
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Auth Card */
        .auth-card {
            background: rgba(26, 29, 36, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 35px 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .auth-card:hover {
            transform: translateY(-4px);
            border-color: rgba(230, 177, 126, 0.3);
            box-shadow: 0 0 30px rgba(230, 177, 126, 0.1);
        }

        /* Header */
        .auth-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #c98f5c 0%, #e6b17e 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(230, 177, 126, 0.4);
            }
            50% {
                box-shadow: 0 0 0 15px rgba(230, 177, 126, 0);
            }
        }

        .logo-icon i {
            font-size: 30px;
            color: #0a0c10;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #f0f3f8 0%, #b4c0d0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
        }

        .auth-subtitle {
            color: #7e8a98;
            font-size: 13px;
        }

        /* Alert Messages */
        .alert-custom {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .error-alert {
            background: rgba(179, 78, 94, 0.15);
            border-left: 3px solid #b34e5e;
            color: #ff8f9f;
        }

        .error-alert i {
            color: #b34e5e;
        }

        .success-alert {
            background: rgba(46, 125, 100, 0.15);
            border-left: 3px solid #2e7d64;
            color: #8bcbae;
        }

        .close-alert {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            margin-left: auto;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .close-alert:hover {
            opacity: 1;
        }

        /* Form */
        .auth-form {
            margin-bottom: 22px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #f0f3f8;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .form-label i {
            color: #e6b17e;
        }

        .input-wrapper {
            position: relative;
        }

        .auth-input {
            width: 100%;
            background: #1e2128;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #f0f3f8;
            padding: 12px 45px 12px 45px;
            border-radius: 14px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        .auth-input:focus {
            outline: none;
            border-color: #e6b17e;
            box-shadow: 0 0 0 3px rgba(230, 177, 126, 0.2);
        }

        .auth-input::placeholder {
            color: #7e8a98;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #7e8a98;
            font-size: 16px;
            pointer-events: none;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #7e8a98;
            cursor: pointer;
            padding: 0;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: #e6b17e;
        }

        /* Form Options */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #b4c0d0;
            font-size: 12px;
        }

        .checkbox-label input {
            display: none;
        }

        .checkmark {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            background: #1e2128;
            display: inline-block;
            position: relative;
            transition: all 0.2s;
        }

        .checkbox-label input:checked + .checkmark {
            background: #e6b17e;
            border-color: #e6b17e;
        }

        .checkbox-label input:checked + .checkmark::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0a0c10;
            font-size: 10px;
            font-weight: bold;
        }

        .forgot-link {
            color: #e6b17e;
            text-decoration: none;
            font-size: 12px;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #f0c9a0;
            text-decoration: underline;
        }

        /* Auth Button */
        .auth-btn {
            width: 100%;
            padding: 12px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-family: 'Poppins', sans-serif;
        }

        .login-btn {
            background: linear-gradient(135deg, #c98f5c 0%, #e6b17e 100%);
            color: #0a0c10;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(230, 177, 126, 0.3);
        }

        /* Divider */
        .auth-divider {
            text-align: center;
            margin: 22px 0;
            position: relative;
        }

        .auth-divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }

        .auth-divider span {
            background: rgba(26, 29, 36, 0.95);
            padding: 0 15px;
            position: relative;
            color: #7e8a98;
            font-size: 12px;
        }

        /* Social Login */
        .social-login {
            display: flex;
            gap: 12px;
            margin-bottom: 22px;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            border-radius: 14px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: #1e2128;
            color: #f0f3f8;
            font-family: 'Poppins', sans-serif;
        }

        .social-btn:hover {
            transform: translateY(-2px);
        }

        .google-btn:hover {
            background: #db4437;
            border-color: #db4437;
        }

        .facebook-btn:hover {
            background: #4267b2;
            border-color: #4267b2;
        }

        /* Footer */
        .auth-footer {
            text-align: center;
            color: #b4c0d0;
            font-size: 13px;
        }

        .signup-link {
            color: #e6b17e;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .signup-link:hover {
            color: #f0c9a0;
            text-decoration: underline;
        }

        /* No Scroll - Everything fits */
        @media (max-height: 700px) {
            .auth-card {
                padding: 25px 30px;
            }
            .auth-header {
                margin-bottom: 20px;
            }
            .logo-icon {
                width: 50px;
                height: 50px;
                margin-bottom: 10px;
            }
            .logo-icon i {
                font-size: 25px;
            }
            .form-group {
                margin-bottom: 14px;
            }
        }
    </style>
</head>
<body>

<div class="floating-books">
    <div class="floating-book" style="top: 10%; left: 5%; font-size: 40px; animation-duration: 25s;">📚</div>
    <div class="floating-book" style="top: 60%; left: 85%; font-size: 30px; animation-duration: 20s;">📖</div>
    <div class="floating-book" style="top: 80%; left: 15%; font-size: 50px; animation-duration: 30s;">📕</div>
    <div class="floating-book" style="top: 30%; left: 90%; font-size: 35px; animation-duration: 22s;">📗</div>
    <div class="floating-book" style="top: 50%; left: 10%; font-size: 25px; animation-duration: 18s;">📘</div>
</div>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo-icon">
                <i class="bi bi-book-half"></i>
            </div>
            <h2 class="auth-title">Welcome Back!</h2>
            <p class="auth-subtitle">Sign in to continue your reading journey</p>
        </div>

        {% if error %}
        <div class="alert-custom error-alert">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span>{{ error }}</span>
            <button type="button" class="close-alert" onclick="this.parentElement.style.display='none'">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
        {% endif %}

        {% if messages %}
            {% for message in messages %}
            <div class="alert-custom {% if message.tags == 'error' %}error-alert{% else %}success-alert{% endif %}">
                <i class="bi {% if message.tags == 'error' %}bi-exclamation-triangle-fill{% else %}bi-check-circle-fill{% endif %}"></i>
                <span>{{ message }}</span>
                <button type="button" class="close-alert" onclick="this.parentElement.style.display='none'">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="auth-form" action="/accounts/login/">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username" class="form-label">
                    <i class="bi bi-person-fill"></i> Username
                </label>
                <div class="input-wrapper">
                    <input type="text" 
                           id="username" 
                           name="username" 
                           class="auth-input" 
                           placeholder="Enter your username"
                           required 
                           autofocus>
                    <i class="bi bi-person input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">
                    <i class="bi bi-lock-fill"></i> Password
                </label>
                <div class="input-wrapper">
                    <input type="password" 
                           id="password" 
                           name="password" 
                           class="auth-input" 
                           placeholder="Enter your password"
                           required>
                    <i class="bi bi-lock input-icon"></i>
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <i class="bi bi-eye-slash" id="toggleIcon"></i>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember" value="remember">
                    <span class="checkmark"></span>
                    Remember me
                </label>
                <a href="/accounts/password-reset/" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="auth-btn login-btn">
                <i class="bi bi-box-arrow-in-right"></i>
                Sign In
            </button>
        </form>

        <div class="auth-divider">
            <span>Or continue with</span>
        </div>

        <div class="social-login">
            <button type="button" class="social-btn google-btn" onclick="socialLogin('google')">
                <i class="bi bi-google"></i>
                <span>Google</span>
            </button>
            <button type="button" class="social-btn facebook-btn" onclick="socialLogin('facebook')">
                <i class="bi bi-facebook"></i>
                <span>Facebook</span>
            </button>
        </div>

        <div class="auth-footer">
            <p>Don't have an account? <a href="/accounts/signup/" class="signup-link">Create Account</a></p>
        </div>
    </div>
</div>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('bi-eye-slash');
            toggleIcon.classList.add('bi-eye');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('bi-eye');
            toggleIcon.classList.add('bi-eye-slash');
        }
    }
    
    function socialLogin(provider) {
        alert(`${provider} login will be available soon!`);
    }
    
    // Auto-hide alerts after 5 seconds
    document.addEventListener('DOMContentLoaded', function() {
        const alerts = document.querySelectorAll('.alert-custom');
        alerts.forEach(alert => {
            setTimeout(() => {
                if (alert) {
                    alert.style.animation = 'fadeOut 0.3s ease';
                    setTimeout(() => {
                        if (alert) alert.style.display = 'none';
                    }, 300);
                }
            }, 5000);
        });
    });
</script>

</body>
</html>
