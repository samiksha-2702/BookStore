{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>BookStore</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="dark-body">

<!-- NAVBAR (Dark Theme) -->
<nav class="navbar navbar-expand-lg custom-navbar px-4 shadow-sm fixed-top">
    <div class="container-fluid">
        <!-- Logo -->
        <a class="navbar-brand fw-bold" href="/">
            📚 BookStore
        </a>

        <!-- Mobile Toggle -->
        <button class="navbar-toggler custom-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Collapsible Content -->
        <div class="collapse navbar-collapse" id="navbarContent">
            <!-- Left Links -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/cart/">Cart</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/orders/">Orders</a>
                </li>
            </ul>

            <!-- Search Bar -->
            <form method="GET" action="/" class="d-flex mx-auto w-50">
                <div class="input-group">
                    <input class="form-control search-input" type="search" name="q" placeholder="Search for books...">
                    <button class="btn search-btn" type="submit">Search</button>
                </div>
            </form>

            <!-- Right Side Auth -->
            <div class="d-flex align-items-center ms-3">
                {% if user.is_authenticated %}
                    <div class="dropdown">
                        <button class="btn user-dropdown-btn dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            👋 Hi, {{ user.username }}
                        </button>
                        <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
                            <li><a class="dropdown-item" href="/profile/">My Profile</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="/accounts/logout/">Logout</a></li>
                        </ul>
                    </div>
                {% else %}
                    <a href="/accounts/login/" class="btn login-btn me-2">Login</a>
                    <a href="/accounts/signup/" class="btn signup-btn">Signup</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<!-- Add spacing for fixed navbar -->
<div style="height: 80px;"></div>

<!-- MAIN CONTENT -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="{% static 'js/script.js' %}"></script>

</body>
</html>
