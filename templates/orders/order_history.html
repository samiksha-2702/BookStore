{% extends 'base.html' %}
{% block content %}
<h2>Order History</h2>
<table class="table">
    <tr>
        <th>Order ID</th>
        <th>Date</th>
        <th>Status</th>
        <th>Total</th>
        <th>Action</th>
    </tr>
    {% for order in orders %}
    <tr>
        <td>{{ order.id }}</td>
        <td>{{ order.created_at }}</td>
        <td>{{ order.status }}</td>
        <td>₹{{ order.total_amount }}</td>
        <td>
            <a href="{% url 'order_success' order.id %}" class="btn btn-sm btn-dark">View</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
