<!-- orders/templates/orders/payment.html -->
{% extends 'base.html' %}
{% block content %}
<h2>Pay ₹{{ total_amount }}</h2>

<form id="razorpay-form">
    <script
        src="https://checkout.razorpay.com/v1/checkout.js"
        data-key="{{ razorpay_merchant_key }}"
        data-amount="{{ total_amount|floatformat:2|add:"0"|floatformat:0 }}"
        data-currency="INR"
        data-order_id="{{ razorpay_order_id }}"
        data-buttontext="Pay Now"
        data-name="BookStore"
        data-description="Book Purchase"
        data-theme.color="#F37254"
        data-prefill.name="{{ user.username }}"
        data-prefill.email="{{ user.email }}">
    </script>
</form>

<script>
    // Capture Razorpay payment and send to server
    document.querySelector('#razorpay-form').onsubmit = function(e) {
        e.preventDefault();

        var options = {
            "key": "{{ razorpay_merchant_key }}",
            "amount": "{{ total_amount|floatformat:2|add:'0'|floatformat:0 }}",
            "currency": "INR",
            "name": "BookStore",
            "description": "Book Purchase",
            "order_id": "{{ razorpay_order_id }}",
            "handler": function (response){
                fetch("{% url 'payment_success' %}", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": "{{ csrf_token }}"
                    },
                    body: JSON.stringify({
                        "order_id": "{{ order.id }}",
                        "razorpay_payment_id": response.razorpay_payment_id,
                        "razorpay_order_id": response.razorpay_order_id
                    })
                }).then(res => {
                    window.location.href = "/orders/success/{{ order.id }}/";
                });
            }
        };
        var rzp1 = new Razorpay(options);
        rzp1.open();
    }
</script>
{% endblock %}
